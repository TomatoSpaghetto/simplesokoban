<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimpleSokoban</title>
    <style>
        :root {
            --vh: 100vh;
        }
        body {
            margin: 0;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        canvas {
            border: none;
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
            touch-action: none;
        }

        #menu {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100dvh;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .btn {
            padding: 12px 24px;
            margin: 8px;
            background: #444;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            font-size: 18px;
            border-radius: 6px;
        }
        .btn:hover { background: #666; }
        #level-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            max-height: 55dvh;
            overflow-y: auto;
            width: 100%;
            max-width: 420px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #000;
            border-radius: 8px;
        }
        #level-select .btn { width: 90%; margin: 4px 0; }

        #game-ui {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
        }
        .game-sidebar {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px;
            background: #000;
            width: 100%;
            box-sizing: border-box;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        #level-title {
            font-size: 22px;
            font-weight: bold;
            color: yellow;
            flex: 1;
            text-align: left;
        }
        #game-controls {
            display: flex;
            gap: 8px;
        }
        #game-controls .btn {
            padding: 8px 16px;
            font-size: 15px;
            white-space: nowrap;
        }

        #game-canvas-container {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: calc(100dvh - 68px);
            overflow: hidden;
            background: #000;
        }

        #mobile-dpad-container {
            position: absolute;
            bottom: 30px;
            right: 25px;
            z-index: 1000;
            touch-action: none;
            user-select: none;
            display: none;
            opacity: 0.95;
        }

        #mobile-dpad {
            position: relative;
            width: 205px;
            height: 205px;
            background: rgba(25,25,25,0.85);
            border: 8px solid rgba(255,255,255,0.4);
            border-radius: 9999px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8), inset 0 0 45px rgba(255,255,255,0.15);
        }

        .dpad-arrow {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 4px solid #eee;
            color: #fff;
            font-size: 38px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
            transition: all 0.1s ease;
        }
        .dpad-arrow:active {
            background: #ffeb3b;
            color: #111;
            transform: scale(0.85);
        }

        .up    { top: 12px; left: 50%; transform: translateX(-50%); }
        .down  { bottom: 12px; left: 50%; transform: translateX(-50%); }
        .left  { left: 12px; top: 50%; transform: translateY(-50%); }
        .right { right: 12px; top: 50%; transform: translateY(-50%); }

        .dpad-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.12);
            border: 6px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            font-size: 28px;
            color: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.3);
            cursor: move;
        }

        #win-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 35px 25px;
            border: 3px solid white;
            text-align: center;
            z-index: 2000;
            width: 92%;
            max-width: 520px;
            border-radius: 12px;
            box-sizing: border-box;
        }
        #win-overlay h2 { font-size: 52px; margin-bottom: 25px; color: yellow; font-weight: bold; }
        .win-btn-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }

        .menu-button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 420px;
        }
        .menu-button-row .btn { flex: 1; margin: 6px 0; }

        #editor-ui {
            display: none;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            height: 100dvh;
            gap: 15px;
            padding: 10px;
            box-sizing: border-box;
        }
        .palette {
            display: grid;
            grid-template-rows: repeat(2, 34px);
            grid-auto-flow: column;
            gap: 6px;
            background: #000;
            padding: 8px;
            border-radius: 8px;
            max-width: 85vw;
            overflow-x: auto;
            align-self: flex-end;
        }
        .palette-item {
            width: 34px;
            height: 34px;
            flex-shrink: 0;
            border: 2px solid transparent;
            cursor: pointer;
            background-size: contain;
            image-rendering: pixelated;
            background-color: #333;
            box-sizing: border-box;
        }
        .palette-item.selected {
            border-color: #ff0;
            background-color: #555;
        }
        #p-erase {
            background-color: #f00;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #p-erase::after {
            content: 'X';
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .editor-controls, .editor-right-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-self: flex-start;
            margin-top: 8px;
        }
        .floor-controls {
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 6px;
        }

        #editor-hamburger-btn {
            display: none;
            background: #444;
            color: white;
            border: 2px solid #aaa;
            font-size: 22px;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 6px;
            flex-shrink: 0;
            align-self: flex-start;
            line-height: 1;
            z-index: 100;
        }

        #editor-drawer-close-btn {
            display: none;
            width: 100%;
            margin-bottom: 4px;
            background: #333;
            color: #fff;
            border: 1px solid #777;
            font-size: 15px;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
        }

        #editor-menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 400;
        }
        #editor-menu-overlay.overlay-open {
            display: block;
        }


        @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
            #editor-hamburger-btn {
                display: flex;
                align-items: center;
                margin-bottom: 4px;
            }
            #editor-drawer-close-btn {
                display: block;
            }

            .editor-controls {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                width: 230px;
                background: #000;
                border-right: 2px solid #555;
                padding: 12px 10px 20px;
                z-index: 500;
                transition: left 0.25s ease;
                overflow-y: auto;
                box-sizing: border-box;
                margin-top: 0;
                gap: 8px;
            }
            .editor-controls.drawer-open {
                left: 0;
            }

            #editor-ui {
                flex-direction: column;
                padding: 6px;
                gap: 4px;
                align-items: stretch;
            }

            #editorCanvas {
                order: 2;
                width: 100% !important;
                flex-shrink: 0;
            }

            .editor-right-panel {
                order: 3;
                width: 100%;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                margin-top: 0;
            }

            .palette {
                order: 1;
                grid-template-rows: repeat(2, 34px);
                max-height: none;
                overflow-x: auto;
                overflow-y: hidden;
                align-self: stretch;
                max-width: 100%;
            }

            .floor-controls {
                order: 2;
                width: 100%;
                box-sizing: border-box;
            }
            .floor-controls table { width: 100%; border-spacing: 4px; }
            .floor-controls .btn {
                width: 100%;
                font-size: 14px;
                padding: 10px 6px;
                margin: 0;
            }
        }

        @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
            #editor-hamburger-btn {
                display: flex;
                align-items: center;
                margin-top: 0;
            }
            #editor-drawer-close-btn {
                display: block;
            }

            .editor-controls {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                width: 230px;
                background: #000;
                border-right: 2px solid #555;
                padding: 12px 10px 20px;
                z-index: 500;
                transition: left 0.25s ease;
                overflow-y: auto;
                box-sizing: border-box;
                margin-top: 0;
                gap: 8px;
            }
            .editor-controls.drawer-open {
                left: 0;
            }

            #editor-ui {
                flex-direction: row;
                padding: 6px;
                gap: 8px;
                align-items: flex-start;
            }

            #editor-hamburger-btn {
                margin-top: 4px;
            }

            #editorCanvas {
                flex: 1;
            }

            .editor-right-panel {
                align-self: flex-start;
                margin-top: 4px;
            }

            .palette {
                align-self: flex-start;
                max-height: calc(100dvh - 120px);
                overflow-y: auto;
                overflow-x: hidden;
            }

            .floor-controls .btn {
                font-size: 13px;
                padding: 8px 10px;
                margin: 3px 0;
            }
        }

        @media (max-width: 600px) and (hover: hover) {
            #game-ui { flex-direction: column; }
            .game-sidebar { padding: 10px 12px; }
            #level-title { font-size: 19px; }
            #game-controls .btn { font-size: 14px; padding: 7px 14px; }

            #game-canvas-container {
                height: calc(100dvh - 68px);
                min-height: 0;
            }

            #editor-ui {
                flex-direction: column;
                padding: 8px;
                gap: 8px;
                height: 100dvh;
            }
            .palette {
                order: 3;
                max-height: 65dvh;
                overflow-y: auto;
                flex-direction: row;
                align-self: center;
            }
            .editor-controls { order: 1; width: 100%; }
            .editor-right-panel { order: 2; width: 100%; }
        }
    </style>
</head>
<body>
<div id="win-overlay">
    <h2 id="win-message">You win!</h2>
    <div class="win-btn-container">
        <button class="btn" id="next-lvl-btn" onclick="nextLevel()">Next Level</button>
        <button class="btn" id="replay-lvl-btn" onclick="replayLevel()">Replay Level</button>
        <button class="btn" id="prev-lvl-btn" onclick="previousLevel()">Previous Level</button>
        <button class="btn" id="win-menu-btn" onclick="showMenu()">Main Menu</button>
        <button class="btn" id="win-editor-btn" onclick="returnToEditor()">Return to Level Editor</button>
    </div>
</div>

<div id="menu">
    <h1>SimpleSokoban</h1>
    <p>Select a Level</p>
    <div id="level-select"></div>
    <div id="local-load-fallback" style="margin-top: 25px; border: 1px dashed #666; padding: 18px; border-radius: 8px;">
        <p>Load a custom <code>level.txt</code> file:</p>
        <input type="file" id="level-file-input" accept=".txt">
    </div>
    <div class="menu-button-row">
        <button class="btn" onclick="openEditor()">Level Editor</button>
        <button class="btn" onclick="downloadLevelsFile()">Download level.txt</button>
    </div>
</div>

<div id="game-ui">
    <div class="game-sidebar">
        <div id="level-title"></div>
        <div id="game-controls">
            <button class="btn" id="back-to-menu-btn" onclick="showMenu()">Back to Menu</button>
            <button class="btn" id="back-to-editor-btn" style="display: none;" onclick="returnToEditor()">Back to Editor</button>
            <button class="btn" onclick="restartLevel()">Restart Level</button>
        </div>
    </div>
    <div id="game-canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<div id="editor-menu-overlay" onclick="closeEditorMenu()"></div>

<div id="editor-ui">
    <button id="editor-hamburger-btn" onclick="toggleEditorMenu()">☰</button>

    <div class="editor-controls">
        <button id="editor-drawer-close-btn" onclick="closeEditorMenu()">✕ Close Menu</button>

        <button class="btn" onclick="testLevel()">Test Level</button>
        <button class="btn" onclick="saveLevel(false)">Save &amp; Download</button>
        <button class="btn" onclick="saveLevel(true)">Download Current Only</button>
        <button class="btn" onclick="document.getElementById('editor-file-input').click()">Load Level</button>
        <input type="file" id="editor-file-input" accept=".txt" style="display: none;" onchange="loadLevelIntoEditor(this)">
        <button class="btn" onclick="clearEditorGrid()">Clear Level</button>
        <button class="btn" onclick="deleteCurrentLevel()">Delete Level</button>
        <button class="btn" onclick="showMenu()">Back to Menu</button>
    </div>
    <canvas id="editorCanvas"></canvas>
    <div class="editor-right-panel">
        <div class="floor-controls">
            <table>
                <tr><td><button class="btn" onclick="addFloor()">Add Floor</button></td>
                    <td><button class="btn" onclick="removeCurrentFloor()">Remove Floor</button></td></tr>
                <tr><td><button class="btn" onclick="nextFloor()">Next Floor</button></td>
                    <td><button class="btn" onclick="prevFloor()">Prev Floor</button></td></tr>
            </table>
        </div>
        <div class="palette">
            <div class="palette-item" id="p-wall" onclick="selectTool('wall')" title="Wall"></div>
            <div class="palette-item" id="p-floor" onclick="selectTool('floor')" title="Floor"></div>
            <div class="palette-item" id="p-icewall" onclick="selectTool('icewall')" title="Ice Wall"></div>
            <div class="palette-item" id="p-icefloor" onclick="selectTool('icefloor')" title="Ice Floor"></div>
            <div class="palette-item" id="p-sandstonewall" onclick="selectTool('sandstonewall')" title="Sandstone Wall"></div>
            <div class="palette-item" id="p-sandfloor" onclick="selectTool('sandfloor')" title="Sand Floor"></div>
            <div class="palette-item" id="p-deepwater" onclick="selectTool('deepwater')" title="Deep Water"></div>
            <div class="palette-item" id="p-water" onclick="selectTool('water')" title="Water"></div>
            <div class="palette-item" id="p-switch" onclick="selectTool('switch')" title="Switch"></div>
            <div class="palette-item" id="p-waterbox" onclick="selectTool('waterbox')" title="Water Box"></div>
            <div class="palette-item" id="p-box" onclick="selectTool('box')" title="Box"></div>
            <div class="palette-item" id="p-player" onclick="selectTool('player')" title="Player"></div>
            <div class="palette-item" id="p-teleporter" onclick="selectTool('teleporter')" title="Teleporter"></div>
            <div class="palette-item" id="p-duplicator" onclick="selectTool('duplicator')" title="Duplicator"></div>
            <div class="palette-item" id="p-ladderup" onclick="selectTool('ladderup')" title="Ladder Up"></div>
            <div class="palette-item" id="p-ladderdown" onclick="selectTool('ladderdown')" title="Ladder Down"></div>
            <div class="palette-item" id="p-floorhole" onclick="selectTool('floorhole')" title="Floor Hole"></div>
            <div class="palette-item" id="p-erase" onclick="selectTool('erase')" title="Eraser"></div>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
