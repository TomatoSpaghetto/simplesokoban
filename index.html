<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleSokoban</title>
    <style>
        body { margin: 0; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 1px solid white; display: none; image-rendering: pixelated; }
        #menu { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn { padding: 10px 20px; margin: 10px; background: #444; color: white; border: 1px solid white; cursor: pointer; font-size: 18px; }
        .btn:hover { background: #666; }
        #level-select { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; max-height: 50vh; overflow-y: auto; width: 100%; max-width: 400px; padding: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); border-radius: 5px; }
        #level-select .btn { width: 90%; margin: 0; }
        #game-ui { display: none; flex-direction: row; align-items: flex-start; width: 100%; height: 100vh; }
        .game-sidebar { display: flex; flex-direction: column; gap: 10px; padding: 20px; background: rgba(255,255,255,0.05); height: 100%; box-sizing: border-box; min-width: 200px; }
        #level-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: yellow; }
        #game-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        #game-controls .btn { margin: 0; width: 100%; }
        #game-canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; height: 100%; overflow: hidden; position: relative; }
        #mobile-controls { display: none; position: absolute; bottom: 20px; right: 20px; gap: 5px; z-index: 500; opacity: 0.5; }
        #mobile-controls:active, .touch-active { opacity: 1; }
        .mobile-row { display: flex; justify-content: center; gap: 5px; }
        .mobile-btn {
            width: 45px; height: 45px; background: rgba(255,255,255,0.2); border: 2px solid white;
            border-radius: 10px; display: flex; justify-content: center; align-items: center;
            font-size: 18px; color: white; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .mobile-btn:active { background: rgba(255,255,255,0.4); }
        #editor-ui { display: none; flex-direction: row; justify-content: center; align-items: center; width: 100%; height: 100vh; gap: 20px; }
        .palette { display: flex; flex-direction: column; gap: 15px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; }
        .palette-item { width: 48px; height: 48px; border: 2px solid transparent; cursor: pointer; background-size: contain; image-rendering: pixelated; }

        .editor-controls { display: flex; flex-direction: column; gap: 10px; }
        #win-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid white;
            text-align: center;
            z-index: 1000;
            width: 80%;
            max-width: 500px;
            box-sizing: border-box;
        }
        #win-overlay h2 { font-size: 48px; margin-bottom: 20px; color: yellow; font-weight: bold; }
        .win-btn-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .menu-button-row { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 400px; flex-direction: row !important; }
    .menu-button-row .btn { flex: 1; margin: 5px 0; min-width: 0; }
    @media (max-width: 600px) {
        #menu { padding: 10px; }
        .menu-button-row { flex-direction: row !important; gap: 5px; }
        .menu-button-row .btn { font-size: 14px; padding: 10px 5px; }
            #game-ui { flex-direction: column; }
            .game-sidebar { height: auto; width: 100%; min-width: 0; padding: 10px; flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: space-between; }
            #level-title { margin-bottom: 0; font-size: 18px; }
            #game-controls { flex-direction: row; width: auto; }
            #game-controls .btn { padding: 5px 10px; font-size: 14px; width: auto; }
            #editor-ui { flex-direction: row; gap: 10px; padding: 10px; justify-content: space-between; }
            .palette { flex-direction: column; order: 3; width: auto; height: 100%; justify-content: center; }
            .editor-controls { flex-direction: column; flex-wrap: nowrap; order: 1; width: auto; height: 100%; justify-content: center; }
            .editor-controls .btn { padding: 8px 12px; font-size: 12px; margin: 2px; width: 80px; }
            .palette-item { width: 36px; height: 36px; }
            #editorCanvas { order: 2; flex-grow: 1; width: 0; }
        }
    </style>
</head>
<body>
<div id="win-overlay">
    <h2 id="win-message">You win!</h2>
    <div class="win-btn-container">
        <button class="btn" id="next-lvl-btn" onclick="nextLevel()">Next Level</button>
        <button class="btn" id="replay-lvl-btn" onclick="replayLevel()">Replay Level</button>
        <button class="btn" id="prev-lvl-btn" onclick="previousLevel()">Previous Level</button>
        <button class="btn" id="win-menu-btn" onclick="showMenu()">Main Menu</button>
        <button class="btn" id="win-editor-btn" onclick="returnToEditor()">Return to Level Editor</button>
    </div>
</div>
<div id="menu">
    <h1>SimpleSokoban</h1>
    <p>Select a Level</p>
    <div id="level-select"></div>
    <div id="local-load-fallback" style="margin-top: 20px; border: 1px dashed #666; padding: 15px;">
        <p>Load a custom <code>level.txt</code> file:</p>
        <input type="file" id="level-file-input" accept=".txt">
    </div>
    <div class="menu-button-row">
        <button class="btn" onclick="openEditor()">Level Editor</button>
        <button class="btn" onclick="downloadLevelsFile()">Download level.txt</button>
    </div>
</div>
<div id="game-ui">
    <div class="game-sidebar">
        <div id="level-title"></div>
        <div id="game-controls">
            <button class="btn" id="back-to-menu-btn" onclick="showMenu()">Back to Menu</button>
            <button class="btn" id="back-to-editor-btn" style="display: none;" onclick="returnToEditor()">Back to Editor</button>
            <button class="btn" onclick="restartLevel()">Restart Level</button>
        </div>
    </div>
    <div id="game-canvas-container">
        <canvas id="gameCanvas"></canvas>
        <div id="mobile-controls">
            <div class="mobile-row">
                <div class="mobile-btn" data-dir="up">↑</div>
            </div>
            <div class="mobile-row">
                <div class="mobile-btn" data-dir="left">←</div>
                <div class="mobile-btn" data-dir="down">↓</div>
                <div class="mobile-btn" data-dir="right">→</div>
            </div>
        </div>
    </div>
</div>
<div id="editor-ui">
    <div class="editor-controls">
        <button class="btn" onclick="testLevel()">Test Level</button>
        <button class="btn" onclick="clearEditorGrid()">Clear</button>
        <button class="btn" onclick="saveLevel()">Download & Import</button>
        <button class="btn" onclick="deleteCurrentLevel()">Delete Level</button>
        <button class="btn" onclick="showMenu()">Back to Menu</button>
    </div>
    <canvas id="editorCanvas"></canvas>
    <div class="palette">
        <div class="palette-item" id="p-wall" onclick="selectTool('wall')" title="Wall"></div>
        <div class="palette-item" id="p-box" onclick="selectTool('box')" title="Box"></div>
        <div class="palette-item" id="p-switch" onclick="selectTool('switch')" title="Switch"></div>
        <div class="palette-item" id="p-player" onclick="selectTool('player')" title="Player"></div>
        <div class="palette-item" id="p-floor" onclick="selectTool('floor')" title="Floor/Erase"></div>
    </div>
</div>
<script>
    // Constants
    const GRID_SIZE = 16;
    const MAX_COL = 26;
    const MAX_ROW = 26;

    // Preload all images
    const images = {
        floor: new Image(),
        wall: new Image(),
        box: new Image(),
        switch: new Image(),
        lookdown: new Image(),
        lookleft: new Image(),
        lookright: new Image(),
        lookup: new Image()
    };

    images.floor.src = 'floor.png';
    images.wall.src = 'wall.png';
    images.box.src = 'box.png';
    images.switch.src = 'switch.png';
    images.lookdown.src = 'lookdown.png';
    images.lookleft.src = 'lookleft.png';
    images.lookright.src = 'lookright.png';
    images.lookup.src = 'lookup.png';

    // Level data
    const levels = [];
    let currentLevelIndex = 0;

    // Game state
    let canvas, ctx;
    let editorCanvas, editorCtx;
    let grid = [];  // 2D array: 'wall', 'floor', 'switch', null
    let boxes = []; // array of {x, y}
    let player = { x: 0, y: 0, facing: 'down' };
    let width = 0, height = 0;
    let scale = 4;  // Zoom level (adjust if needed)
    let editorScale = 2;
    let baseEditorScale = 2;
    let editorPinchScale = 1;
    let currentTool = 'wall';
    let isEditing = false;
    let isTesting = false;
    let isWinning = false;
    let isMobile = false;
    let testLevelData = null;

    // Detect mobile device
    function detectMobile() {
        isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
    }
    detectMobile();

    // Attach mobile control events
    function initMobileControls() {
        const container = document.getElementById('mobile-controls');
        const mobileBtns = document.querySelectorAll('.mobile-btn');
        
        container.addEventListener('touchstart', () => {
            container.classList.add('touch-active');
        });
        container.addEventListener('touchend', () => {
            container.classList.remove('touch-active');
        });
        container.addEventListener('touchcancel', () => {
            container.classList.remove('touch-active');
        });

        mobileBtns.forEach(btn => {
            const dir = btn.getAttribute('data-dir');
            
            const handlePress = (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleMobileMove(dir);
            };

            btn.addEventListener('mousedown', handlePress);
            btn.addEventListener('touchstart', handlePress);
        });
    }

    // Call init when DOM is ready
    window.addEventListener('DOMContentLoaded', initMobileControls);

    // Editor state (26x26 default for new levels)
    const EDITOR_WIDTH = 26;
    const EDITOR_HEIGHT = 26;
    let editorGrid = [];
    let editorBoxes = [];
    let editorPlayer = { x: 1, y: 1 };

    // Directions
    const directions = {
        up: { dx: 0, dy: -1, look: 'lookup' },
        down: { dx: 0, dy: 1, look: 'lookdown' },
        left: { dx: -1, dy: 0, look: 'lookleft' },
        right: { dx: 1, dy: 0, look: 'lookright' }
    };

    function isPlayerEnclosed(gridArray, w, h, px, py) {
        const visited = Array.from({length: w}, () => Array(h).fill(false));
        const floodFromEdges = (w, h, isWallFn, fillFn) => {
            for (let y = 0; y < h; y++) {
                if (!isWallFn(0, y)) fillFn(0, y);
                if (!isWallFn(w - 1, y)) fillFn(w - 1, y);
            }
            for (let x = 0; x < w; x++) {
                if (!isWallFn(x, 0)) fillFn(x, 0);
                if (!isWallFn(x, h - 1)) fillFn(x, h - 1);
            }
        };
        const floodFillFn = (x, y) => {
            const stack = [[x, y]];
            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                if (cx < 0 || cx >= w || cy < 0 || cy >= h || 
                    gridArray[cx][cy] === 'wall' || visited[cx][cy]) continue;
                visited[cx][cy] = true;
                stack.push([cx - 1, cy], [cx + 1, cy], [cx, cy - 1], [cx, cy + 1]);
            }
        };
        floodFromEdges(w, h, (x, y) => gridArray[x][y] === 'wall', floodFillFn);
        
        // If the player's position was NOT visited by the flood fill from edges, 
        // it means they are in an enclosed space (or they are a wall, which shouldn't happen).
        // Also check if the player's position is actually inside the grid.
        if (px < 0 || px >= w || py < 0 || py >= h) return false;
        return !visited[px][py] && gridArray[px][py] !== 'wall';
    }

    function showEnclosureWarning(returnMode) {
        const overlay = document.getElementById('win-overlay');
        const message = document.getElementById('win-message');
        const nextBtn = document.getElementById('next-lvl-btn');
        const replayBtn = document.getElementById('replay-lvl-btn');
        const prevBtn = document.getElementById('prev-lvl-btn');
        const menuBtn = document.getElementById('win-menu-btn');
        const editorBtn = document.getElementById('win-editor-btn');

        message.innerText = "Error: Player must be in an enclosed space!";
        nextBtn.style.display = 'none';
        replayBtn.style.display = 'none';
        prevBtn.style.display = 'none';
        
        if (returnMode === "Return to Level Editor") {
            menuBtn.style.display = 'none';
            editorBtn.innerText = "Return to Level Editor";
            editorBtn.style.display = 'inline-block';
        } else {
            menuBtn.innerText = "Main Menu";
            menuBtn.style.display = 'inline-block';
            editorBtn.style.display = 'none';
        }
        
        overlay.style.display = 'block';
    }

    // Init when all images loaded
    let loadedImages = 0;
    Object.values(images).forEach(img => {
        img.onload = () => {
            loadedImages++;
            if (loadedImages === Object.keys(images).length) {
                initGame();
            }
        };
    });

    async function initGame() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        editorCanvas = document.getElementById('editorCanvas');
        editorCtx = editorCanvas.getContext('2d');
        editorCtx.imageSmoothingEnabled = false;

        // Setup palette icons
        document.getElementById('p-wall').style.backgroundImage = `url(${images.wall.src})`;
        document.getElementById('p-box').style.backgroundImage = `url(${images.box.src})`;
        document.getElementById('p-switch').style.backgroundImage = `url(${images.switch.src})`;
        document.getElementById('p-player').style.backgroundImage = `url(${images.lookdown.src})`;
        document.getElementById('p-floor').style.backgroundImage = `url(${images.floor.src})`;
        selectTool('wall');

        editorCanvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) { // Left click
                isPanning = false;
                initialPinchDistance = null; // Reset pinch state on new interaction
                lastTouchX = e.clientX;
                lastTouchY = e.clientY;
                handleEditorClick(e);
            }
        });
        editorCanvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) { // Left button held
                if (editorPinchScale > 1) {
                    isPanning = true;
                    const dx = (e.clientX - lastTouchX) / editorScale;
                    const dy = (e.clientY - lastTouchY) / editorScale;
                    editorOffsetX += dx;
                    editorOffsetY += dy;
                    lastTouchX = e.clientX;
                    lastTouchY = e.clientY;
                    resizeEditorCanvas(true);
                } else {
                    handleEditorClick(e);
                }
            }
        });
        
        editorCanvas.addEventListener('touchstart', (e) => { 
            if (e.touches.length === 2) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialPinchScale = editorPinchScale;
            } else if (e.touches.length === 1) {
                isPanning = false;
                initialPinchDistance = null; // Reset pinch state
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        }, { passive: false });
        editorCanvas.addEventListener('touchmove', (e) => { 
            if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const zoomFactor = currentDistance / initialPinchDistance;
                editorPinchScale = Math.max(1, Math.min(5, initialPinchScale * zoomFactor));
                resizeEditorCanvas(true);
            } else if (e.touches.length === 1) {
                if (editorPinchScale > 1) {
                    e.preventDefault();
                    isPanning = true;
                    const dx = (e.touches[0].clientX - lastTouchX) / editorScale;
                    const dy = (e.touches[0].clientY - lastTouchY) / editorScale;
                    editorOffsetX += dx;
                    editorOffsetY += dy;
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                    resizeEditorCanvas(true);
                } else {
                    handleEditorClick(e);
                }
            }
        }, { passive: false });
        editorCanvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0 && !isPanning && !initialPinchDistance) {
                // It was a tap
                handleEditorClick(e.changedTouches[0]);
            }
            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
        }, { passive: false });
        
        // Setup pinch zoom for editor
        initEditorPinchZoom();
        
        const fallbackLevels = `Level 1:
Walls: 1A, 1B, 1C, 1D, 1E, 1F, 1G, 1H, 1I, 1J, 2A, 2J, 3A, 3J, 4A, 4J, 5A, 5J, 6A, 6J, 7A, 7J, 8A, 8J, 9A, 9J, 10A, 10J, 11A, 11J, 12A, 12J, 13A, 13J, 14A, 14B, 14C, 14D, 14E, 14F, 14G, 14H, 14I, 14J

    function resizeEditorCanvas(isUserInteraction = false) {
        // Temporarily show editor-ui to get accurate offsets if it's hidden,
        // but it's usually called when it's already displayed.
        const editorUi = document.getElementById('editor-ui');
        const wasHidden = editorUi.style.display === 'none' || editorUi.style.display === '';
        if (wasHidden) editorUi.style.display = 'flex';

        // Calculate available space for the canvas, accounting for the left and right sidebars
        const controlsWidth = document.querySelector('.editor-controls').offsetWidth;
        const paletteWidth = document.querySelector('.palette').offsetWidth;
        const gap = window.innerWidth <= 600 ? 10 : 20; 
        const viewWidth = window.innerWidth - controlsWidth - paletteWidth - (gap * 2) - 20;
        const viewHeight = window.innerHeight - 20;
        
        // Use a fixed scale for the editor to avoid excessive zooming,
        // but still allow it to fit on smaller screens if necessary.
        const targetScale = 2; // Fixed comfortable scale
        const fullGridWidth = EDITOR_WIDTH * GRID_SIZE;
        const fullGridHeight = EDITOR_HEIGHT * GRID_SIZE;
        
        baseEditorScale = Math.min(targetScale, viewWidth / fullGridWidth, viewHeight / fullGridHeight);
        editorScale = baseEditorScale * editorPinchScale;

        editorCanvas.width = viewWidth;
        editorCanvas.height = viewHeight;
        editorCtx.imageSmoothingEnabled = false;
        editorCanvas.style.display = 'inline-block';

        // Center the 26x26 grid itself if it's not a user interaction (like window resize or initial open)
        if (!isUserInteraction) {
            editorOffsetX = (viewWidth / editorScale - fullGridWidth) / 2;
            editorOffsetY = (viewHeight / editorScale - fullGridHeight) / 2;
        }

        if (wasHidden) editorUi.style.display = 'none';
    }

    function handleEditorClick(e) {
        // Prevent drawing when pinching or panning
        if (isPanning || initialPinchDistance) return;
        if (e.touches && e.touches.length > 1) return;
        
        // On mobile, if zoomed in, we assume single touch move is panning, not drawing.
        // Taps (touchstart/touchend or mousedown without move) should still place blocks.
        if (editorPinchScale > 1 && (e.type === 'touchmove' || e.type === 'mousemove')) return;
        
        const rect = editorCanvas.getBoundingClientRect();
        // Support both mouse and touch events
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;
        
        // Convert to grid coordinates using scale and offset
        const x = Math.floor(mouseX / (GRID_SIZE * editorScale) - editorOffsetX / GRID_SIZE);
        const y = Math.floor(mouseY / (GRID_SIZE * editorScale) - editorOffsetY / GRID_SIZE);

        if (x < 0 || x >= EDITOR_WIDTH || y < 0 || y >= EDITOR_HEIGHT) return;

        if (currentTool === 'wall') {
            editorGrid[x][y] = 'wall';
            editorBoxes = editorBoxes.filter(b => b.x !== x || b.y !== y);
        } else if (currentTool === 'box') {
            editorGrid[x][y] = null;
            if (!editorBoxes.some(b => b.x === x && b.y === y)) {
                editorBoxes.push({x, y});
            }
        } else if (currentTool === 'switch') {
            editorGrid[x][y] = 'switch';
            editorBoxes = editorBoxes.filter(b => b.x !== x || b.y !== y);
        } else if (currentTool === 'player') {
            editorGrid[x][y] = null;
            editorPlayer = {x, y};
            editorBoxes = editorBoxes.filter(b => b.x !== x || b.y !== y);
        } else if (currentTool === 'floor') {
            editorGrid[x][y] = null;
            editorBoxes = editorBoxes.filter(b => b.x !== x || b.y !== y);
        }
    }

    function parseLevel(text) {
        const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
        let walls = [], tempBoxes = [], tempSwitches = [], playerPos = null;
        let usedCols = 1, usedRows = 1;

        for (const line of lines) {
            const parts = line.split(':');
            if (parts.length < 2) continue;
            const type = parts[0].trim();
            const coordsStr = parts[1].trim();

            const coords = coordsStr.split(',').map(c => c.trim().toUpperCase())
                .filter(c => c.length >= 2 && /^\d+[A-Z]$/.test(c))
                .map(c => {
                    const letter = c.slice(-1);
                    const num = parseInt(c.slice(0, -1), 10);
                    const col = num - 1; // 0-based
                    const row = letter.charCodeAt(0) - 'A'.charCodeAt(0);
                    if (col < 0 || col >= MAX_COL || row < 0 || row >= MAX_ROW) return null;
                    usedCols = Math.max(usedCols, col + 1);
                    usedRows = Math.max(usedRows, row + 1);
                    return {x: col, y: row};
                }).filter(Boolean);

            const lowerType = type.toLowerCase();
            if (lowerType === 'walls') walls = coords;
            else if (lowerType === 'boxes') tempBoxes = coords;
            else if (lowerType === 'switches') tempSwitches = coords;
            else if (lowerType === 'player' && coords.length > 0) playerPos = coords[0];
        }

        width = Math.min(usedCols, MAX_COL);
        height = Math.min(usedRows, MAX_ROW);

        // Init grid as empty
        grid = Array.from({length: width}, () => Array(height).fill(null));

        // Place walls
        walls.forEach(pos => {
            grid[pos.x][pos.y] = 'wall';
        });

        // Place switches
        tempSwitches.forEach(pos => {
            grid[pos.x][pos.y] = 'switch';
        });

        // Place boxes
        boxes = tempBoxes;

        // Place player
        if (playerPos) {
            player.x = playerPos.x;
            player.y = playerPos.y;
            player.facing = 'down';
        }
    }

    function isWall(x, y) {
        if (x < 0 || x >= width || y < 0 || y >= height) return true;
        return grid[x][y] === 'wall';
    }

    function isBoxAt(x, y) {
        return boxes.some(b => b.x === x && b.y === y);
    }
    

    let offsetX = 0, offsetY = 0;

    function fitCamera() {
        const container = document.getElementById('game-canvas-container');
        const viewWidth = container.offsetWidth;
        const viewHeight = container.offsetHeight;
        
        // Find the bounding box of the geometry (walls, switches, boxes, player)
        let minX = width, minY = height, maxX = -1, maxY = -1;
        let hasContent = false;

        for (let x = 0; x < width; x++) {
            for (let y = 0; y < height; y++) {
                if (grid[x][y] === 'wall' || grid[x][y] === 'switch') {
                    minX = Math.min(minX, x);
                    minY = Math.min(minY, y);
                    maxX = Math.max(maxX, x);
                    maxY = Math.max(maxY, y);
                    hasContent = true;
                }
            }
        }
        boxes.forEach(b => {
            minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
            maxX = Math.max(maxX, b.x); maxY = Math.max(maxY, b.y);
            hasContent = true;
        });
        minX = Math.min(minX, player.x); minY = Math.min(minY, player.y);
        maxX = Math.max(maxX, player.x); maxY = Math.max(maxY, player.y);
        hasContent = true;

        if (!hasContent) {
            minX = 0; minY = 0; maxX = width - 1; maxY = height - 1;
        }

        const geoWidth = (maxX - minX + 1) * GRID_SIZE;
        const geoHeight = (maxY - minY + 1) * GRID_SIZE;

        const margin = isMobile ? 0.98 : 0.9;
        scale = Math.min(viewWidth / geoWidth * margin, viewHeight / geoHeight * margin);

        canvas.width = viewWidth;
        canvas.height = viewHeight;
        ctx.imageSmoothingEnabled = false;

        // Center the geometry on the canvas
        offsetX = (viewWidth / scale - geoWidth) / 2 - minX * GRID_SIZE;
        offsetY = (viewHeight / scale - geoHeight) / 2 - minY * GRID_SIZE;
    }

    function handleMobileMove(dir) {

    function handleInput(e) {
        if (isEditing) return;
        if (document.getElementById('gameCanvas').style.display === 'none') return;
        if (document.getElementById('win-overlay').style.display === 'block') return;
        let dir = null;
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'up') dir = 'up';
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'down') dir = 'down';
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'left') dir = 'left';
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'right') dir = 'right';

        if (dir) {
            player.facing = dir;
            const { dx, dy } = directions[dir];
            const nx = player.x + dx;
            const ny = player.y + dy;

            // Always check win on move
            setTimeout(() => { checkWin(); }, 500);

            // Check if can move
            if (nx < 0 || nx >= width || ny < 0 || ny >= height || isWall(nx, ny)) return;

            // Check box
            const boxIndex = boxes.findIndex(b => b.x === nx && b.y === ny);
            if (boxIndex !== -1) {
                const boxNx = nx + dx;
                const boxNy = ny + dy;
                if (boxNx < 0 || boxNx >= width || boxNy < 0 || boxNy >= height || isWall(boxNx, boxNy) || isBoxAt(boxNx, boxNy)) return;
                // Push box
                boxes[boxIndex].x = boxNx;
                boxes[boxIndex].y = boxNy;
            }

            // Move player
            player.x = nx;
            player.y = ny;
        }
    }

    function checkWin() {
        // Level is completed when ALL switches are covered by boxes
        // Find all switch positions
        const switches = [];
        for (let x = 0; x < width; x++) {
            for (let y = 0; y < height; y++) {
                if (grid[x][y] === 'switch') {
                    switches.push({x, y});
                }
            }
        }

        const allSwitchesCovered = switches.every(s => 
            boxes.some(b => b.x === s.x && b.y === s.y)
        );

        if (allSwitchesCovered && switches.length > 0) {
            if (isWinning) return;
            isWinning = true;

            const overlay = document.getElementById('win-overlay');
            const message = document.getElementById('win-message');
            const nextBtn = document.getElementById('next-lvl-btn');
            const replayBtn = document.getElementById('replay-lvl-btn');
            const prevBtn = document.getElementById('prev-lvl-btn');
            const menuBtn = document.getElementById('win-menu-btn');
            const editorBtn = document.getElementById('win-editor-btn');

            if (isTesting) {
                message.innerText = "Test complete!";
                nextBtn.style.display = 'none';
                replayBtn.style.display = 'none';
                prevBtn.style.display = 'none';
                menuBtn.innerText = "Return to Main Menu";
                menuBtn.style.display = 'inline-block';
                editorBtn.innerText = "Return to Level Editor";
                editorBtn.style.display = 'inline-block';
            } else {
                message.innerText = "You win!";
                nextBtn.style.display = (currentLevelIndex < levels.length - 1) ? 'inline-block' : 'none';
                replayBtn.style.display = 'inline-block';
                prevBtn.style.display = (currentLevelIndex > 0) ? 'inline-block' : 'none';
                menuBtn.innerText = "Main Menu";
                menuBtn.style.display = 'inline-block';
                editorBtn.style.display = 'none';
            }
            overlay.style.display = 'block';
        }
    }

    function gameLoop() {
        if (isEditing) drawEditor();
        else draw();
        requestAnimationFrame(gameLoop);
    }

    function drawEditor() {
        if (document.getElementById('editor-ui').style.display === 'none') return;
        editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
        editorCtx.save();
        editorCtx.scale(editorScale, editorScale);
        editorCtx.translate(editorOffsetX, editorOffsetY);

        // Draw a light grid background for the 26x26 editor area
        editorCtx.strokeStyle = '#333';
        editorCtx.lineWidth = 0.5;
        for (let x = 0; x <= EDITOR_WIDTH; x++) {
            editorCtx.beginPath();
            editorCtx.moveTo(x * GRID_SIZE, 0);
            editorCtx.lineTo(x * GRID_SIZE, EDITOR_HEIGHT * GRID_SIZE);
            editorCtx.stroke();
        }
        for (let y = 0; y <= EDITOR_HEIGHT; y++) {
            editorCtx.beginPath();
            editorCtx.moveTo(0, y * GRID_SIZE);
            editorCtx.lineTo(EDITOR_WIDTH * GRID_SIZE, y * GRID_SIZE);
            editorCtx.stroke();
        }

        // Flood fill to determine floor areas in editor
        const visited = Array.from({length: EDITOR_WIDTH}, () => Array(EDITOR_HEIGHT).fill(false));
        const floodFromEdges = (w, h, isWallFn, fillFn) => {
            for (let y = 0; y < h; y++) {
                if (!isWallFn(0, y)) fillFn(0, y);
                if (!isWallFn(w - 1, y)) fillFn(w - 1, y);
            }
            for (let x = 0; x < w; x++) {
                if (!isWallFn(x, 0)) fillFn(x, 0);
                if (!isWallFn(x, h - 1)) fillFn(x, h - 1);
            }
        };
        const floodFillFn = (x, y) => {
            const stack = [[x, y]];
            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                if (cx < 0 || cx >= EDITOR_WIDTH || cy < 0 || cy >= EDITOR_HEIGHT || 
                    editorGrid[cx][cy] === 'wall' || visited[cx][cy]) continue;
                visited[cx][cy] = true;
                stack.push([cx - 1, cy], [cx + 1, cy], [cx, cy - 1], [cx, cy + 1]);
            }
        };
        floodFromEdges(EDITOR_WIDTH, EDITOR_HEIGHT, (x, y) => editorGrid[x][y] === 'wall', floodFillFn);

        // Draw floor in enclosed areas
        for (let x = 0; x < EDITOR_WIDTH; x++) {
            for (let y = 0; y < EDITOR_HEIGHT; y++) {
                if (!visited[x][y] || editorGrid[x][y] === 'wall') {
                    // Check if it's within the "bounds" of placed objects to avoid drawing floor in infinite void?
                    // Actually, the requirement says "completely sealed by walls".
                    // If it's not visited by flood fill from edges, it's sealed (or it IS a wall).
                    if (editorGrid[x][y] !== 'wall') {
                        editorCtx.drawImage(images.floor, x * GRID_SIZE, y * GRID_SIZE);
                    }
                }
            }
        }

        // Draw grid assets
        for (let x = 0; x < EDITOR_WIDTH; x++) {
            for (let y = 0; y < EDITOR_HEIGHT; y++) {
                const cell = editorGrid[x][y];
                if (cell === 'wall') {
                    // Draw floor under wall too? Usually yes for SimpleSokoban
                    editorCtx.drawImage(images.floor, x * GRID_SIZE, y * GRID_SIZE);
                    editorCtx.drawImage(images.wall, x * GRID_SIZE, y * GRID_SIZE);
                }
                if (cell === 'switch') {
                    editorCtx.drawImage(images.floor, x * GRID_SIZE, y * GRID_SIZE);
                    editorCtx.drawImage(images.switch, x * GRID_SIZE, y * GRID_SIZE);
                }
            }
        }

        // Draw boxes
        editorBoxes.forEach(b => {
            // Only draw floor if it's in a sealed area (which it should be if placed by user, but let's be consistent)
            if (!visited[b.x][b.y]) {
                editorCtx.drawImage(images.floor, b.x * GRID_SIZE, b.y * GRID_SIZE);
            }
            editorCtx.drawImage(images.box, b.x * GRID_SIZE, b.y * GRID_SIZE);
        });

        // Draw player
        if (!visited[editorPlayer.x][editorPlayer.y]) {
            editorCtx.drawImage(images.floor, editorPlayer.x * GRID_SIZE, editorPlayer.y * GRID_SIZE);
        }
        editorCtx.drawImage(images.lookdown, editorPlayer.x * GRID_SIZE, editorPlayer.y * GRID_SIZE);

        editorCtx.restore();
    }

    function draw() {
        if (document.getElementById('gameCanvas').style.display === 'none') return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(scale, scale);
        ctx.translate(offsetX, offsetY);

        // Flood fill to determine floor areas in game
        const visited = Array.from({length: width}, () => Array(height).fill(false));
        const floodFromEdges = (w, h, isWallFn, fillFn) => {
            for (let y = 0; y < h; y++) {
                if (!isWallFn(0, y)) fillFn(0, y);
                if (!isWallFn(w - 1, y)) fillFn(w - 1, y);
            }
            for (let x = 0; x < w; x++) {
                if (!isWallFn(x, 0)) fillFn(x, 0);
                if (!isWallFn(x, h - 1)) fillFn(x, h - 1);
            }
        };
        const floodFillFn = (x, y) => {
            const stack = [[x, y]];
            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                if (cx < 0 || cx >= width || cy < 0 || cy >= height || 
                    grid[cx][cy] === 'wall' || visited[cx][cy]) continue;
                visited[cx][cy] = true;
                stack.push([cx - 1, cy], [cx + 1, cy], [cx, cy - 1], [cx, cy + 1]);
            }
        };
        floodFromEdges(width, height, (x, y) => grid[x][y] === 'wall', floodFillFn);

        // Draw floor in enclosed areas
        for (let x = 0; x < width; x++) {
            for (let y = 0; y < height; y++) {
                if (!visited[x][y] && grid[x][y] !== 'wall') {
                    ctx.drawImage(images.floor, x * GRID_SIZE, y * GRID_SIZE);
                }
            }
        }

        // Draw grid assets
        for (let x = 0; x < width; x++) {
            for (let y = 0; y < height; y++) {
                const cell = grid[x][y];
                if (cell === 'wall') {
                    ctx.drawImage(images.floor, x * GRID_SIZE, y * GRID_SIZE);
                    ctx.drawImage(images.wall, x * GRID_SIZE, y * GRID_SIZE);
                }
                if (cell === 'switch') {
                    // Floor already drawn above
                    ctx.drawImage(images.switch, x * GRID_SIZE, y * GRID_SIZE);
                }
            }
        }

        // Draw boxes
        boxes.forEach(b => {
            ctx.drawImage(images.box, b.x * GRID_SIZE, b.y * GRID_SIZE);
        });

        // Draw player
        const playerImgKey = directions[player.facing].look;
        ctx.drawImage(images[playerImgKey], player.x * GRID_SIZE, player.y * GRID_SIZE);

        ctx.restore();
    }
</script>
